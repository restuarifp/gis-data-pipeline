services:
  postgres-db:
    image: postgis/postgis:latest
    restart: always
    container_name: postgres_db
    platform: linux/amd64
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: metabase_db
    ports:
      - 5432:5432
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - gisnet

  metabase:
    image: metabase/metabase:latest
    restart: always
    container_name: metabase
    hostname: metabase
    ports:
      - 3000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: password123
      MB_DB_HOST: postgres-db
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      - postgres-db
    networks:
      - gisnet

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt_worker
    restart: unless-stopped
    volumes:
      - ./dbt:/usr/app/dbt
    environment:
      - DBT_POSTGRES_HOST=postgres-db
      - DBT_POSTGRES_USER=admin
      - DBT_POSTGRES_PW=password123
      - DBT_POSTGRES_DB=capil_db
    depends_on:
      - postgres-db
    profiles: ["cli_only"]
    networks:
      - gisnet

  onlyoffice-docs:
    image: onlyoffice/documentserver:9.3.1.1
    container_name: onlyoffice-docs
    restart: always
    ports:
      - 8080:80
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=susSyf-dihdaq-7xudfa
      - JWT_HEADER=Authorization
    volumes:
      - oo_data:/var/www/onlyoffice/Data
      - oo_log:/var/log/onlyoffice

networks:
  gisnet:
    driver: bridge

volumes:
  oo_data:
  oo_log:
